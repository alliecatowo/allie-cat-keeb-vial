name: Quick Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  python-tests:
    name: Python unit tests (build.py)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build.py unit tests
        run: python3 -m unittest tests.test_build_py -v

      - name: Validate CI matrix JSON
        run: |
          output=$(python3 build.py --generate-matrix-release)
          echo "$output" | python3 -c "import sys, json; data=json.load(sys.stdin); assert 'include' in data; print(f'Matrix OK: {len(data[\"include\"])} entries')"

  lint:
    name: Lint Python files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint build.py and tools/
        run: |
          flake8 build.py tools/callgraph.py tests/test_build_py.py \
            --max-line-length=120 \
            --extend-ignore=E501,W503
