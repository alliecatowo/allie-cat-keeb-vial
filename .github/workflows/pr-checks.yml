name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/ISSUE_TEMPLATE/**'

jobs:
  # Check PR description and format
  pr-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR Description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.trim().length < 50) {
              core.setFailed('PR description must be at least 50 characters long');
            }

  # Build firmware to ensure changes compile
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          # single-device: one pointing device on left or right half
          - { keyboard: "lily58/rev1", pointing_device: "trackball",  side: "left",  oled: "no"  }
          - { keyboard: "lily58/rev1", pointing_device: "trackball",  side: "right", oled: "yes" }
          - { keyboard: "lily58/rev1", pointing_device: "tps43",      side: "left",  oled: "no"  }
          - { keyboard: "lily58/rev1", pointing_device: "trackpoint", side: "left",  oled: "yes" }
          # dual-device: one device per half
          - { keyboard: "lily58/rev1", pointing_device: "trackball_tps43",     side: "left",  oled: "no"  }
          - { keyboard: "lily58/rev1", pointing_device: "trackball_tps43",     side: "right", oled: "yes" }
          - { keyboard: "lily58/rev1", pointing_device: "trackpoint_trackball", side: "left", oled: "no"  }
          # sofle: plain vial (no pointing device)
          - { keyboard: "sofle/rev1",  pointing_device: "",            side: "",      oled: ""    }

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache QMK dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~/qmk_firmware/.build
          key: ${{ runner.os }}-qmk-${{ hashFiles('**/requirements.txt') }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            avr-libc \
            binutils-arm-none-eabi \
            binutils-avr \
            gcc-arm-none-eabi \
            gcc-avr \
            python3-pip
          pip3 install qmk

      - name: Test build configuration
        run: |
          qmk config user.qmk_home=$GITHUB_WORKSPACE
          python build.py --build-single \
            --keyboard "${{ matrix.config.keyboard }}" \
            --keymap vial \
            --pointing-device "${{ matrix.config.pointing_device }}" \
            --side "${{ matrix.config.side }}" \
            --oled "${{ matrix.config.oled }}"

      - name: Check firmware size
        run: |
          for f in build_lily58/*.uf2 build_sofle/*.hex; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f")
            echo "Firmware size ($f): $size bytes"
            if [ $size -gt 1572864 ]; then
              echo "::warning::Firmware $f is large ($size bytes), consider optimization"
            fi
          done

  # Code quality checks
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for debug code
        run: |
          # Check for common debug patterns
          if grep -r "console\.log\|print(\|TODO\|FIXME\|XXX" --include="*.c" --include="*.h" --include="*.py" .; then
            echo "::warning::Found debug code or TODO comments"
          fi

      - name: Check file permissions
        run: |
          # Ensure no files have executable bit set unnecessarily
          find . -type f -name "*.c" -o -name "*.h" -o -name "*.md" | xargs ls -la | grep -E "^-rwx" && \
            echo "::warning::Found source files with executable permissions" || true

  # Generate call graph for Azoteq driver
  callgraph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang graphviz
          pip3 install pydot
      - name: Build call graph
        run: python3 tools/callgraph.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: azoteq-callgraph
          path: docs/azoteq_callgraph.svg
