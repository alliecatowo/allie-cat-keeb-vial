# Build Workflow

name: Build

on:
  push:
    branches:
      - feat/slim-userspace

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'

      - name: Install Dependencies
        run: |
          npm install

      - name: Run Build
        run: |
          npm run build
